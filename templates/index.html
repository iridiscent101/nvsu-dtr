{% extends "base.html" %} {% block content %}
<div class="h-[calc(100vh-130px)] flex flex-col items-center justify-center px-4">
  <div
    class="glass-strong p-10 rounded-3xl shadow-xl max-w-lg w-full text-center relative overflow-hidden animate-spring dark:shadow-black/30">
    <!-- Accent -->
    <div class="absolute top-0 left-0 w-full h-1.5"
      style="background: linear-gradient(90deg, #067302, #f2e205, #067302)"></div>

    <!-- Mode Toggle -->
    <div class="flex justify-center gap-2 mb-6">
      <button id="btn-rfid" onclick="switchMode('rfid')"
        class="px-4 py-2 rounded-lg text-sm font-medium transition-all bg-brand text-white">
        RFID Mode
      </button>
      <button id="btn-qr" onclick="switchMode('qr')"
        class="px-4 py-2 rounded-lg text-sm font-medium transition-all bg-gray-200 dark:bg-dark-border text-gray-700 dark:text-gray-300">
        QR Code Mode
      </button>
    </div>

    <div class="mb-8">
      <h1 class="text-4xl font-headline font-semibold text-gray-900 dark:text-white mb-2 tracking-tight">
        Time In / Out
      </h1>
      <p id="instruction-text" class="text-gray-500 dark:text-dark-muted font-medium text-sm">
        Please tap your NVSU ID to record attendance
      </p>
    </div>

    <!-- RFID Scan Area -->
    <div id="rfid-area" class="relative w-44 h-44 mx-auto mb-8">
      <div
        class="absolute inset-0 rounded-full bg-gradient-to-br from-brand/10 to-brand/5 dark:from-brand/15 dark:to-brand/5 border-4 border-dashed border-brand/30 flex items-center justify-center animate-spring-scale"
        style="animation-delay: 0.2s">
        <svg class="w-20 h-20 text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z">
          </path>
        </svg>
      </div>
      <div class="absolute inset-[-8px] rounded-full border-2 border-brand/20 animate-ping"
        style="animation-duration: 2s"></div>
      <div class="absolute inset-[-20px] rounded-full border border-brand/10 animate-ping"
        style="animation-duration: 3s"></div>
    </div>

    <!-- QR Scan Area -->
    <div id="qr-area"
      class="hidden relative w-64 h-64 mx-auto mb-8 rounded-2xl overflow-hidden border-2 border-dashed border-brand/50">
      <video id="qr-video" class="w-full h-full object-cover"></video>
      <div id="qr-overlay" class="absolute inset-0 flex items-center justify-center bg-black/50">
        <div class="w-48 h-48 border-2 border-green-500 rounded-lg"></div>
      </div>
      <button id="start-qr-btn" onclick="startQRScanner()"
        class="absolute inset-0 flex flex-col items-center justify-center bg-black/70 text-white cursor-pointer">
        <svg class="w-12 h-12 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z">
          </path>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z">
          </path>
        </svg>
        <span class="text-sm font-medium">Tap to start camera</span>
      </button>
    </div>

    <input type="text" id="rfid_input" autofocus class="opacity-0 absolute -z-10" autocomplete="off" />

    <div id="status_message"
      class="transition-all duration-500 opacity-0 min-h-[60px] flex items-center justify-center rounded-2xl font-semibold text-base">
    </div>

    <div class="mt-6 flex items-center justify-center gap-2 text-sm text-gray-400 dark:text-dark-muted">
      <span class="relative flex h-2.5 w-2.5">
        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-brand/60 opacity-75"></span>
        <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-brand"></span>
      </span>
      <span id="scanner-status">Scanner active. Ready for input...</span>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script>
  let currentMode = "rfid";
  let isProcessing = false;
  let qrStream = null;
  let qrScanning = false;

  document.addEventListener("DOMContentLoaded", () => {
    const rfidInput = document.getElementById("rfid_input");

    document.addEventListener("click", (e) => {
      if (currentMode === "rfid" && !e.target.closest("#qr-area")) {
        rfidInput.focus();
      }
    });
    rfidInput.focus();

    rfidInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        const tag = rfidInput.value.trim();
        rfidInput.value = "";
        if (tag && !isProcessing) processTap(tag);
      }
    });
  });

  function switchMode(mode) {
    currentMode = mode;
    const rfidArea = document.getElementById("rfid-area");
    const qrArea = document.getElementById("qr-area");
    const btnRfid = document.getElementById("btn-rfid");
    const btnQr = document.getElementById("btn-qr");
    const instructionText = document.getElementById("instruction-text");
    const scannerStatus = document.getElementById("scanner-status");
    const rfidInput = document.getElementById("rfid_input");

    if (mode === "rfid") {
      rfidArea.classList.remove("hidden");
      qrArea.classList.add("hidden");
      btnRfid.classList.add("bg-brand", "text-white");
      btnRfid.classList.remove(
        "bg-gray-200",
        "dark:bg-dark-border",
        "text-gray-700",
        "dark:text-gray-300",
      );
      btnQr.classList.remove("bg-brand", "text-white");
      btnQr.classList.add(
        "bg-gray-200",
        "dark:bg-dark-border",
        "text-gray-700",
        "dark:text-gray-300",
      );
      instructionText.textContent =
        "Please tap your NVSU ID to record attendance";
      scannerStatus.textContent = "Scanner active. Ready for input...";
      stopQRScanner();
      rfidInput.focus();
    } else {
      rfidArea.classList.add("hidden");
      qrArea.classList.remove("hidden");
      btnQr.classList.add("bg-brand", "text-white");
      btnQr.classList.remove(
        "bg-gray-200",
        "dark:bg-dark-border",
        "text-gray-700",
        "dark:text-gray-300",
      );
      btnRfid.classList.remove("bg-brand", "text-white");
      btnRfid.classList.add(
        "bg-gray-200",
        "dark:bg-dark-border",
        "text-gray-700",
        "dark:text-gray-300",
      );
      instructionText.textContent = "Point camera at QR code to scan";
      scannerStatus.textContent = "Camera ready. Position QR code in frame...";
    }
  }

  async function startQRScanner() {
    const video = document.getElementById("qr-video");
    const startBtn = document.getElementById("start-qr-btn");

    try {
      qrStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" },
      });
      video.srcObject = qrStream;
      startBtn.classList.add("hidden");
      qrScanning = true;
      scanQRCode();
    } catch (err) {
      console.error("Camera error:", err);
      showStatus(
        "Camera access denied. Please enable camera permissions.",
        "error",
      );
    }
  }

  function stopQRScanner() {
    qrScanning = false;
    if (qrStream) {
      qrStream.getTracks().forEach((track) => track.stop());
      qrStream = null;
    }
    const video = document.getElementById("qr-video");
    const startBtn = document.getElementById("start-qr-btn");
    video.srcObject = null;
    startBtn.classList.remove("hidden");
  }

  function scanQRCode() {
    if (!qrScanning) return;

    const video = document.getElementById("qr-video");
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height);

    if (code) {
      qrScanning = false;
      showStatus("QR Code detected! Processing...", "processing");
      processTap(code.data);
    } else {
      requestAnimationFrame(scanQRCode);
    }
  }

  async function processTap(tag) {
    isProcessing = true;
    showStatus("Processing...", "processing");

    try {
      const endpoint = currentMode === "qr" ? "/api/qr-scan" : "/api/tap";
      const response = await fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          rfid_tag: tag,
          qr_data: tag,
        }),
      });
      const data = await response.json();

      if (response.ok) {
        if (data.action === "timein") {
          showStatus(`Welcome, ${data.user}!<br>${data.message}`, "success");
          showToast(`${data.user} timed in successfully!`);
        } else if (data.action === "timeout") {
          showStatus(`Goodbye, ${data.user}!<br>${data.message}`, "info");
          showToast(`${data.user} timed out successfully!`);
        }
      } else {
        showStatus(`Error: ${data.message}`, "error");
        showToast(data.message, "error");
      }

      setTimeout(() => {
        isProcessing = false;
        if (currentMode === "qr") {
          qrScanning = true;
          scanQRCode();
        }
      }, 4000);
    } catch (error) {
      showStatus("System Error. Please try again.", "error");
      showToast("System error. Please try again.", "error");
      isProcessing = false;
      if (currentMode === "qr") {
        qrScanning = true;
        scanQRCode();
      }
    }
  }

  function showStatus(message, type) {
    const statusBox = document.getElementById("status_message");
    statusBox.className =
      "transition-all duration-500 opacity-100 min-h-[60px] flex items-center justify-center rounded-2xl font-semibold text-base mt-4 p-4";

    if (type === "success") {
      statusBox.classList.add(
        "bg-brand-50",
        "dark:bg-brand-900/20",
        "text-brand-dark",
        "dark:text-brand-light",
        "border",
        "border-brand-200",
        "dark:border-brand-900",
      );
    } else if (type === "error") {
      statusBox.classList.add(
        "bg-red-50",
        "dark:bg-red-900/20",
        "text-red-700",
        "dark:text-red-400",
        "border",
        "border-red-200",
        "dark:border-red-800",
      );
    } else if (type === "info") {
      statusBox.classList.add(
        "bg-blue-50",
        "dark:bg-blue-900/20",
        "text-blue-700",
        "dark:text-blue-400",
        "border",
        "border-blue-200",
        "dark:border-blue-800",
      );
    } else {
      statusBox.classList.add(
        "bg-gray-100",
        "dark:bg-dark-border",
        "text-gray-500",
        "dark:text-dark-muted",
      );
    }

    statusBox.innerHTML = message;
    statusBox.style.animation =
      "spring-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards";

    if (type !== "processing") {
      setTimeout(() => {
        statusBox.classList.add("opacity-0");
      }, 3500);
    }
  }
</script>
{% endblock %}
