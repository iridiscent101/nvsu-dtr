{% extends "base.html" %} {% block title %}Mobile QR Scanner | NVSU DTR{%
endblock %} {% block content %}
<div class="h-[calc(100vh-100px)] flex flex-col items-center justify-center px-4">
  <div
    class="glass-strong p-10 rounded-3xl shadow-xl max-w-md w-full relative overflow-hidden animate-spring dark:shadow-black/30">
    <!-- Top gradient accent -->
    <div class="absolute top-0 left-0 w-full h-1.5"
      style="background: linear-gradient(90deg, #067302, #f2e205, #067302)"></div>

    <div class="text-center mb-8">
      <div class="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-5 shadow-lg animate-spring-scale"
        style="
          animation-delay: 0.15s;
          background: linear-gradient(135deg, #067302, #055902);
          box-shadow: 0 8px 20px rgba(6, 115, 2, 0.3);
        ">
        <svg class="w-9 h-9 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
      </div>
      <h1 class="text-2xl font-extrabold text-gray-900 dark:text-white tracking-tight">
        QR Code Scanner
      </h1>
      <p class="text-gray-500 dark:text-dark-muted text-sm mt-1.5">
        Confirm desktop login from your phone
      </p>
    </div>

    <div class="stagger-item flex flex-col items-center" style="animation-delay: 0.1s">
      <div
        class="w-full mb-6 rounded-2xl border border-gray-200 dark:border-dark-border bg-white/70 dark:bg-dark-surface/70 backdrop-blur-sm p-5 text-center">
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-2">
          Desktop login token
        </p>
        <p class="text-xs break-all font-mono text-gray-700 dark:text-gray-200">
          {{ token }}
        </p>
      </div>

      <div
        class="w-full mb-6 rounded-2xl border border-green-200 dark:border-green-800 bg-green-50 dark:bg-green-900/20 p-5 text-center">
        <p class="text-sm font-semibold text-green-800 dark:text-green-200">
          Use this phone to approve the login on desktop.
        </p>
      </div>

      <div id="status" class="text-center mb-6 w-full">
        <p class="text-gray-500 dark:text-gray-400 text-sm">
          Tap confirm to continue
        </p>
      </div>

      <div class="w-full space-y-3">
        <button id="confirm-btn"
          class="w-full text-white font-bold py-3.5 px-4 rounded-xl transition-all duration-500 shadow-lg" style="
            background: linear-gradient(135deg, #067302, #055902);
            box-shadow: 0 4px 20px rgba(6, 115, 2, 0.3);
          ">
          Confirm Login
        </button>
        <a href="{{ url_for('login') }}"
          class="block w-full text-center py-2.5 px-4 rounded-xl transition-all duration-300 border border-gray-200 dark:border-dark-border text-gray-700 dark:text-gray-300">
          Cancel
        </a>
      </div>
    </div>
  </div>
</div>

<script>
  const statusEl = document.getElementById('status');
  const confirmBtn = document.getElementById('confirm-btn');
  const token = {{ token| tojson }};

  async function validateToken() {
    confirmBtn.disabled = true;
    statusEl.innerHTML = '<p class="text-gray-500 dark:text-gray-400 text-sm">Confirming login...</p>';

    try {
      const response = await fetch('/api/qr-validate', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          token: token
        })
      });

      const data = await response.json();

      if (data.success) {
        statusEl.innerHTML = '<p class="text-green-500 text-sm">Desktop login approved. You may return to the desktop screen.</p>';
      } else {
        statusEl.innerHTML = `<p class="text-red-500 text-sm">${data.message || 'Validation failed'}</p>`;
        confirmBtn.disabled = false;
      }
    } catch (err) {
      console.error('Validation error:', err);
      statusEl.innerHTML = '<p class="text-red-500 text-sm">Network error. Please try again.</p>';
      confirmBtn.disabled = false;
    }
  }

  confirmBtn.addEventListener('click', validateToken);
</script>
{% endblock %}
