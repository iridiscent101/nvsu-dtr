{% extends "base.html" %} {% block title %}QR Codes | NVSU DTR{% endblock %} {%
block content %}
<div class="p-6 max-w-7xl mx-auto">
  <div class="mb-8">
    <h1 class="text-3xl font-extrabold text-gray-900 dark:text-white mb-2">
      QR Codes for Attendance
    </h1>
    <p class="text-gray-500 dark:text-dark-muted">
      Generate and print QR codes for each user to use at the kiosk
    </p>
  </div>

  <div
    class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"
  >
    {% for user in users %}
    <div class="glass-strong p-6 rounded-2xl shadow-lg dark:shadow-black/30">
      <div class="text-center">
        <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-2">
          {{ user.name }}
        </h3>
        <p class="text-sm text-gray-500 dark:text-dark-muted mb-4">
          ID: {{ user.rfid_tag }}
        </p>

        <img
          src="data:image/png;base64,{{ user.qr_code }}"
          alt="QR Code for {{ user.name }}"
          class="w-40 h-40 mx-auto mb-4 rounded-lg border-2 border-gray-200 dark:border-dark-border"
        />

        <button
          onclick="printQR('{{ user.name }}', '{{ user.rfid_tag }}', '{{ user.qr_code }}')"
          class="w-full py-2.5 px-4 rounded-xl transition-all duration-300 border border-gray-200 dark:border-dark-border text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-dark-surface text-sm font-medium"
        >
          Print QR Code
        </button>
      </div>
    </div>
    {% endfor %}
  </div>
</div>

<div id="print-area" class="hidden"></div>

<script>
  function printQR(name, rfidTag, qrCode) {
    const printWindow = window.open("", "_blank");
    printWindow.document.write(`
            <!DOCTYPE html>
            <html>
            <head>
                <title>QR Code - ${name}</title>
                <style>
                    body {
                        font-family: Arial, sans-serif;
                        text-align: center;
                        padding: 40px;
                    }
                    .qr-container {
                        display: inline-block;
                        padding: 20px;
                        border: 2px solid #000;
                        border-radius: 10px;
                    }
                    img {
                        width: 200px;
                        height: 200px;
                    }
                    .name {
                        font-size: 24px;
                        font-weight: bold;
                        margin-top: 10px;
                    }
                    .id {
                        font-size: 16px;
                        color: #666;
                        margin-top: 5px;
                    }
                    @media print {
                        body { margin: 0; }
                    }
                </style>
            </head>
            <body>
                <div class="qr-container">
                    <img src="data:image/png;base64,${qrCode}" alt="QR Code">
                    <div class="name">${name}</div>
                    <div class="id">${rfidTag}</div>
                </div>
                <script>
                    window.onload = function() {
                        window.print();
                        window.close();
                    };
                <\/script>
            </body>
            </html>
        `);
    printWindow.document.close();
  }
</script>
{% endblock %}
